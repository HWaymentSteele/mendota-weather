<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0d1117">
<title>Wind Dashboard — Lake Mendota</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1c2230;
    --border: #2a3347;
    --accent: #e8a020;
    --accent2: #5b9cf6;
    --text: #e6edf3;
    --muted: #8b949e;
    --wind-low: #4cc9a0;
    --wind-med: #f0a500;
    --wind-high: #e05252;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    padding: 16px;
    padding-top: env(safe-area-inset-top, 16px);
    max-width: 480px;
    margin: 0 auto;
  }

  header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 20px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--border);
  }

  .site-title {
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
  }

  .site-loc {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    margin-top: 3px;
  }

  .fetch-btn {
    background: var(--accent);
    color: #000;
    border: none;
    padding: 8px 16px;
    border-radius: 6px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: opacity 0.2s;
    white-space: nowrap;
    -webkit-tap-highlight-color: transparent;
  }
  .fetch-btn:hover { opacity: 0.85; }
  .fetch-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .status-bar {
    font-size: 11px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    margin-bottom: 16px;
    min-height: 16px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 12px;
  }

  .card-label {
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    margin-bottom: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .current-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .metric {
    background: var(--surface2);
    border-radius: 8px;
    padding: 12px;
  }

  .metric-label {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 4px;
  }

  .metric-value {
    font-family: 'Space Mono', monospace;
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
    line-height: 1;
  }

  .metric-unit {
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
  }

  .wind-big {
    display: flex;
    align-items: center;
    gap: 16px;
    background: var(--surface2);
    border-radius: 8px;
    padding: 14px;
    margin-bottom: 12px;
  }

  .compass {
    width: 60px;
    height: 60px;
    flex-shrink: 0;
  }

  .wind-info { flex: 1; }

  .wind-speed-big {
    font-family: 'Space Mono', monospace;
    font-size: 32px;
    font-weight: 700;
    line-height: 1;
  }

  .wind-dir-text {
    font-size: 13px;
    color: var(--muted);
    margin-top: 3px;
  }

  .wind-gust {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    margin-top: 6px;
  }

  .hourly-scroll {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding-bottom: 4px;
    scrollbar-width: none;
    -webkit-overflow-scrolling: touch;
  }
  .hourly-scroll::-webkit-scrollbar { display: none; }

  .hour-cell {
    flex-shrink: 0;
    width: 60px;
    background: var(--surface2);
    border-radius: 8px;
    padding: 8px 6px;
    text-align: center;
  }

  .hour-time {
    font-size: 10px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    margin-bottom: 6px;
  }

  .hour-speed {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    font-weight: 700;
  }

  .hour-temp {
    font-size: 10px;
    color: var(--muted);
    margin-top: 3px;
  }

  .history-item {
    background: var(--surface2);
    border-radius: 8px;
    padding: 10px 12px;
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border: 1px solid transparent;
    transition: border 0.15s;
  }
  .history-item:hover { border-color: var(--border); }

  .history-time {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
  }

  .history-vals {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--text);
    text-align: right;
  }

  .empty-state {
    text-align: center;
    color: var(--muted);
    font-size: 13px;
    padding: 20px;
  }

  .section-tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 12px;
  }

  .tab {
    padding: 6px 14px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .tab.active {
    background: var(--accent);
    color: #000;
    border-color: var(--accent);
    font-weight: 700;
  }

  .clear-btn {
    font-size: 10px;
    color: var(--muted);
    background: none;
    border: none;
    cursor: pointer;
    font-family: 'Space Mono', monospace;
    padding: 4px;
    text-decoration: underline;
  }

  .conditions-row {
    margin-top: 10px;
    font-size: 12px;
    color: var(--muted);
    padding-top: 8px;
    border-top: 1px solid var(--border);
  }
</style>
</head>
<body>

<header>
  <div>
    <div class="site-title">Wind Dashboard</div>
    <div class="site-loc">Fitchburg, WI</div>
  </div>
  <button class="fetch-btn" id="fetchBtn" onclick="fetchData()">↻ FETCH</button>
</header>

<div class="status-bar" id="statusBar">Press FETCH to load latest conditions</div>

<div class="section-tabs">
  <button class="tab active" onclick="showTab('now')">Now</button>
  <button class="tab" onclick="showTab('hourly')">Hourly</button>
  <button class="tab" onclick="showTab('history')">History</button>
</div>

<!-- NOW TAB -->
<div id="tab-now">
  <div class="card">
    <div class="card-label">Current Conditions</div>
    <div class="empty-state" id="currentEmpty">No data yet — hit FETCH</div>
    <div id="currentData" style="display:none"></div>
  </div>
</div>

<!-- HOURLY TAB -->
<div id="tab-hourly" style="display:none">
  <div class="card">
    <div class="card-label">Wind by Hour (mph)</div>
    <div class="empty-state" id="hourlyEmpty">No data yet — hit FETCH</div>
    <div class="hourly-scroll" id="hourlyData"></div>
  </div>
</div>

<!-- HISTORY TAB -->
<div id="tab-history" style="display:none">
  <div class="card">
    <div class="card-label">
      <span>Saved Snapshots</span>
      <button class="clear-btn" onclick="clearHistory()">clear all</button>
    </div>
    <div id="historyList"><div class="empty-state">No snapshots saved yet</div></div>
  </div>
</div>

<script>
  const API_KEY = '5H65KJKDWTKJLQ7UU5VUBFDEL';
  const LAT = 43.0814, LON = -89.3829;
  const BASE = `https://weather.visualcrossing.com/VisualCrossingWebServices/rest/services/timeline/${LAT},${LON}/today?key=${API_KEY}`;
  const STORAGE_KEY = 'wx_snapshots';

  // ── Storage ──────────────────────────────────────────────
  function loadHistory() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); }
    catch { return []; }
  }

  function saveSnapshot(snap) {
    const history = loadHistory();
    history.unshift(snap);
    if (history.length > 100) history.splice(100);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
  }

  function clearHistory() {
    if (!confirm('Clear all saved snapshots?')) return;
    localStorage.removeItem(STORAGE_KEY);
    renderHistory();
  }

  // ── Helpers ───────────────────────────────────────────────
  function windColor(spd) {
    if (spd < 10) return 'var(--wind-low)';
    if (spd < 20) return 'var(--wind-med)';
    return 'var(--wind-high)';
  }

  function windClass(spd) {
    if (spd < 10) return 'wind-color-low';
    if (spd < 20) return 'wind-color-med';
    return 'wind-color-high';
  }

  function dirLabel(deg) {
    const dirs = ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
    return dirs[Math.round(deg / 22.5) % 16];
  }

  function fmt12(isoTime) {
    const [h, m] = isoTime.split(':');
    const hr = parseInt(h);
    return `${hr % 12 || 12}${m !== '00' ? ':' + m : ''}${hr < 12 ? 'a' : 'p'}`;
  }

  function dirArrowSVG(deg) {
    const rad = (deg - 90) * Math.PI / 180;
    const cx = 12, cy = 12, r = 9;
    const tx = cx + r * Math.cos(rad);
    const ty = cy + r * Math.sin(rad);
    const tail = { x: cx - 6 * Math.cos(rad), y: cy - 6 * Math.sin(rad) };
    return `<svg width="24" height="24" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="11" fill="none" stroke="var(--border)" stroke-width="1"/>
      <line x1="${tail.x}" y1="${tail.y}" x2="${tx}" y2="${ty}" stroke="var(--accent)" stroke-width="2" stroke-linecap="round"/>
      <circle cx="${tx}" cy="${ty}" r="2" fill="var(--accent)"/>
    </svg>`;
  }

  function compassSVG(deg) {
    const rad = (deg - 90) * Math.PI / 180;
    const cx = 30, cy = 30, r = 22;
    const tx = cx + r * Math.cos(rad);
    const ty = cy + r * Math.sin(rad);
    const tail = { x: cx - 12 * Math.cos(rad), y: cy - 12 * Math.sin(rad) };
    return `<svg class="compass" viewBox="0 0 60 60">
      <circle cx="30" cy="30" r="28" fill="var(--surface)" stroke="var(--border)" stroke-width="1.5"/>
      <text x="30" y="10" text-anchor="middle" fill="var(--muted)" font-size="7" font-family="Space Mono,monospace">N</text>
      <text x="30" y="56" text-anchor="middle" fill="var(--muted)" font-size="7" font-family="Space Mono,monospace">S</text>
      <text x="54" y="33" text-anchor="middle" fill="var(--muted)" font-size="7" font-family="Space Mono,monospace">E</text>
      <text x="6" y="33" text-anchor="middle" fill="var(--muted)" font-size="7" font-family="Space Mono,monospace">W</text>
      <line x1="${tail.x}" y1="${tail.y}" x2="${tx}" y2="${ty}" stroke="var(--accent)" stroke-width="3" stroke-linecap="round"/>
      <circle cx="${tx}" cy="${ty}" r="3" fill="var(--accent)"/>
      <circle cx="30" cy="30" r="3" fill="var(--border)"/>
    </svg>`;
  }

  // ── Fetch ─────────────────────────────────────────────────
  async function fetchData() {
    const btn = document.getElementById('fetchBtn');
    const status = document.getElementById('statusBar');
    btn.disabled = true;
    status.textContent = 'Fetching…';

    try {
      const [curRes, hrRes] = await Promise.all([
        fetch(`${BASE}&include=current`),
        fetch(`${BASE}&include=hours`)
      ]);

      if (!curRes.ok || !hrRes.ok) throw new Error(`API error ${curRes.status}`);

      const [curJson, hrJson] = await Promise.all([curRes.json(), hrRes.json()]);

      window._currentData = curJson.currentConditions;
      window._hourlyData  = hrJson.days?.[0]?.hours || [];

      const now = new Date().toLocaleString('en-US', {
        month: 'short', day: 'numeric',
        hour: 'numeric', minute: '2-digit'
      });
      status.textContent = `Updated ${now}`;

      renderCurrent();
      renderHourly();

      saveSnapshot({
        ts:         new Date().toISOString(),
        windspeed:  window._currentData.windspeed,
        winddir:    window._currentData.winddir,
        windgust:   window._currentData.windgust,
        temp:       window._currentData.temp,
        humidity:   window._currentData.humidity,
        conditions: window._currentData.conditions
      });
      renderHistory();

    } catch (e) {
      status.textContent = `Error: ${e.message}`;
    }
    btn.disabled = false;
  }

  // ── Render: Current ───────────────────────────────────────
  function renderCurrent() {
    const d = window._currentData;
    if (!d) return;
    const spd  = Math.round(d.windspeed || 0);
    const gust = Math.round(d.windgust  || 0);
    const dir  = Math.round(d.winddir   || 0);

    document.getElementById('currentEmpty').style.display = 'none';
    const el = document.getElementById('currentData');
    el.style.display = 'block';
    el.innerHTML = `
      <div class="wind-big">
        ${compassSVG(dir)}
        <div class="wind-info">
          <div class="wind-speed-big" style="color:${windColor(spd)}">${spd} <span style="font-size:14px;color:var(--muted)">mph</span></div>
          <div class="wind-dir-text">From ${dirLabel(dir)} (${dir}°)</div>
          ${gust > spd ? `<div class="wind-gust">Gusting to ${gust} mph</div>` : ''}
        </div>
      </div>
      <div class="current-grid">
        <div class="metric">
          <div class="metric-label">Temp</div>
          <div class="metric-value">${Math.round(d.temp || 0)}°</div>
          <div class="metric-unit">Feels ${Math.round(d.feelslike ?? d.temp)}°F</div>
        </div>
        <div class="metric">
          <div class="metric-label">Humidity</div>
          <div class="metric-value">${Math.round(d.humidity || 0)}%</div>
          <div class="metric-unit">Relative</div>
        </div>
        <div class="metric">
          <div class="metric-label">Precip</div>
          <div class="metric-value">${d.precip ?? 0}"</div>
          <div class="metric-unit">Today so far</div>
        </div>
        <div class="metric">
          <div class="metric-label">Visibility</div>
          <div class="metric-value">${Math.round(d.visibility || 0)}</div>
          <div class="metric-unit">miles</div>
        </div>
      </div>
      <div class="conditions-row">${d.conditions || ''}</div>
    `;
  }

  // ── Render: Hourly ────────────────────────────────────────
  function renderHourly() {
    const hours = window._hourlyData;
    if (!hours || !hours.length) return;

    document.getElementById('hourlyEmpty').style.display = 'none';
    const el = document.getElementById('hourlyData');
    const currentHour = new Date().getHours();

    el.innerHTML = hours.map((h, i) => {
      const hr  = parseInt(h.datetime.split(':')[0]);
      const spd = Math.round(h.windspeed || 0);
      const dir = h.winddir || 0;
      const isPast = hr < currentHour;
      return `<div class="hour-cell" style="${isPast ? 'opacity:0.4' : ''}">
        <div class="hour-time">${fmt12(h.datetime)}</div>
        <div style="margin:0 auto 5px;display:flex;justify-content:center">${dirArrowSVG(dir)}</div>
        <div class="hour-speed" style="color:${windColor(spd)}">${spd}</div>
        <div class="hour-temp">${Math.round(h.temp || 0)}°</div>
      </div>`;
    }).join('');

    // Scroll to current hour
    setTimeout(() => {
      const cells = el.querySelectorAll('.hour-cell');
      const target = cells[Math.max(0, currentHour - 1)];
      if (target) target.scrollIntoView({ behavior: 'smooth', inline: 'start', block: 'nearest' });
    }, 150);
  }

  // ── Render: History ───────────────────────────────────────
  function renderHistory() {
    const history = loadHistory();
    const el = document.getElementById('historyList');
    if (!history.length) {
      el.innerHTML = '<div class="empty-state">No snapshots saved yet</div>';
      return;
    }
    el.innerHTML = history.map(s => {
      const d     = new Date(s.ts);
      const label = d.toLocaleString('en-US', {
        month: 'short', day: 'numeric',
        hour: 'numeric', minute: '2-digit'
      });
      const spd = Math.round(s.windspeed || 0);
      return `<div class="history-item">
        <div>
          <div class="history-time">${label}</div>
          <div style="font-size:12px;color:var(--muted);margin-top:2px">${s.conditions || ''}</div>
        </div>
        <div class="history-vals">
          <div style="color:${windColor(spd)}">${spd} mph ${dirLabel(s.winddir || 0)}</div>
          <div style="color:var(--muted);font-size:10px">${Math.round(s.temp || 0)}°F · ${Math.round(s.humidity || 0)}% RH</div>
        </div>
      </div>`;
    }).join('');
  }

  // ── Tabs ──────────────────────────────────────────────────
  function showTab(name) {
    ['now', 'hourly', 'history'].forEach(t => {
      document.getElementById(`tab-${t}`).style.display = t === name ? '' : 'none';
    });
    document.querySelectorAll('.tab').forEach((btn, i) => {
      btn.classList.toggle('active', ['now', 'hourly', 'history'][i] === name);
    });
  }

  // Init
  renderHistory();
</script>
</body>
</html>
